<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="風景になる前の">
  <title>透き通る | RESPAWN</title>
  <link rel="stylesheet" href="https://use.typekit.net/qsa7gru.css">
  <link rel="stylesheet" href="../assets/work-detail.css">
</head>
<body>
  <nav class="site-nav" aria-label="サイト内ナビゲーション">
    <button class="nav-toggle" type="button" aria-controls="site-menu" aria-expanded="false" aria-label="メニューを開く">
      <span></span><span></span><span></span>
    </button>
    <ul id="site-menu">
      <li><a href="../index.html#greeting">ご挨拶</a></li>
      <li><a href="../index.html#works">展示作品</a></li>
      <li><a href="../index.html#info">開催概要</a></li>
    </ul>
  </nav>

  <main>
    <section class="hero-image" aria-label="透き通る メイン画像">
      <span class="image-placeholder">作品画像準備中</span>
      <img src="../Image/works/work-05/main.jpg" data-fallback-src="../Image/works/work-05/main.png" alt="透き通る" data-optional-image>
    </section>

    <section class="work-info" aria-labelledby="work-title">
      <h1 class="work-title" id="work-title">透き通る
        <span class="work-title-en" lang="en">Transparent</span></h1>
      <p class="work-author">藤森 玲央 <span class="work-author-en" lang="en">/ Fujimori Reo</span></p>
      <p class="work-duration">体験時間：5分</p>
      <p class="work-description">風景になる前の</p>
    </section>

    <section class="carousel" aria-label="作品画像スライダー" data-carousel>
      <div class="carousel-track">
        <button class="carousel-side prev" type="button" aria-label="前の作品画像" data-carousel-prev></button>
        <div class="carousel-frame">
          <span class="carousel-placeholder">作品画像<br>（3 から 5 枚程度，無くても可）</span>
          <div class="carousel-images">

          </div>
        </div>
        <button class="carousel-side next" type="button" aria-label="次の作品画像" data-carousel-next></button>
      </div>
      <div class="carousel-dots">
        <button class="carousel-dot" type="button" aria-label="作品画像 1 を表示" data-carousel-dot="0"></button>
        <button class="carousel-dot" type="button" aria-label="作品画像 2 を表示" data-carousel-dot="1"></button>
        <button class="carousel-dot" type="button" aria-label="作品画像 3 を表示" data-carousel-dot="2"></button>
      </div>
    </section>





    <div class="back-wrap">
      <a class="back-button" href="../index.html#works">BACK</a>
    </div>
  </main>
  <footer class="under-image" aria-label="下部画像">
    <img src="../Image/UnderImage.jpg" alt="">
  </footer>
  <script src="../assets/site.js"></script>
</body>
</html>
