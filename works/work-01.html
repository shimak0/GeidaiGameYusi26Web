<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="独自の背骨コントローラを使って遊ぶ２人用ゲーム。普段意識しない「背骨」でプレイヤーを動かすことで、飾らない素直な動きがゲーム内外に現れる。剥き出しの存在になってお互いの個性を感じよう。">
  <title>セ・ボ〜ンズ | RESPAWN</title>
  <link rel="stylesheet" href="https://use.typekit.net/qsa7gru.css">
  <link rel="stylesheet" href="../assets/work-detail.css">
</head>
<body>
  <nav class="site-nav" aria-label="サイト内ナビゲーション">
    <button class="nav-toggle" type="button" aria-controls="site-menu" aria-expanded="false" aria-label="メニューを開く">
      <span></span><span></span><span></span>
    </button>
    <ul id="site-menu">
      <li><a href="../index.html#greeting">ご挨拶</a></li>
      <li><a href="../index.html#works">展示作品</a></li>
      <li><a href="../index.html#info">開催概要</a></li>
    </ul>
  </nav>

  <main>
    <section class="hero-image" aria-label="セ・ボ〜ンズ メイン画像">
      <span class="image-placeholder">作品画像準備中</span>
      <img src="../Image/works/work-01/main.jpg" data-fallback-src="../Image/works/work-01/main.png" alt="セ・ボ〜ンズ" data-optional-image>
    </section>

    <section class="work-info" aria-labelledby="work-title">
      <h1 class="work-title" id="work-title">セ・ボ〜ンズ
        <span class="work-title-en" lang="en">Cʼest Bones</span></h1>
      <p class="work-author">福眞 奏太 <span class="work-author-en" lang="en">/ FUKUMA Kanata</span></p>
      <p class="work-duration">体験時間：1~10分</p>
      <p class="work-description">独自の背骨コントローラを使って遊ぶ２人用ゲーム。普段意識しない「背骨」でプレイヤーを動かすことで、飾らない素直な動きがゲーム内外に現れる。剥き出しの存在になってお互いの個性を感じよう。</p>
    </section>

    <section class="carousel" aria-label="作品画像スライダー" data-carousel>
      <div class="carousel-track">
        <button class="carousel-side prev" type="button" aria-label="前の作品画像" data-carousel-prev></button>
        <div class="carousel-frame">
          <span class="carousel-placeholder">作品画像<br>（3 から 5 枚程度，無くても可）</span>
          <div class="carousel-images">
            <img class="carousel-image" src="../Image/works/work-01/gallery-01.jpg" data-fallback-src="../Image/works/work-01/gallery-01.png" alt="セ・ボ〜ンズ 作品画像 1" loading="lazy" hidden>
            <img class="carousel-image" src="../Image/works/work-01/gallery-02.jpg" data-fallback-src="../Image/works/work-01/gallery-02.png" alt="セ・ボ〜ンズ 作品画像 2" loading="lazy" hidden>
            <img class="carousel-image" src="../Image/works/work-01/gallery-03.jpg" data-fallback-src="../Image/works/work-01/gallery-03.png" alt="セ・ボ〜ンズ 作品画像 3" loading="lazy" hidden>
            <img class="carousel-image" src="../Image/works/work-01/gallery-04.jpg" data-fallback-src="../Image/works/work-01/gallery-04.png" alt="セ・ボ〜ンズ 作品画像 4" loading="lazy" hidden>
            <img class="carousel-image" src="../Image/works/work-01/gallery-05.jpg" data-fallback-src="../Image/works/work-01/gallery-05.png" alt="セ・ボ〜ンズ 作品画像 5" loading="lazy" hidden>
          </div>
        </div>
        <button class="carousel-side next" type="button" aria-label="次の作品画像" data-carousel-next></button>
      </div>
      <div class="carousel-dots">
        <button class="carousel-dot" type="button" aria-label="作品画像 1 を表示" data-carousel-dot="0"></button>
        <button class="carousel-dot" type="button" aria-label="作品画像 2 を表示" data-carousel-dot="1"></button>
        <button class="carousel-dot" type="button" aria-label="作品画像 3 を表示" data-carousel-dot="2"></button>
        <button class="carousel-dot" type="button" aria-label="作品画像 4 を表示" data-carousel-dot="3"></button>
        <button class="carousel-dot" type="button" aria-label="作品画像 5 を表示" data-carousel-dot="4"></button>
      </div>
    </section>





    <div class="back-wrap">
      <a class="back-button" href="../index.html#works">BACK</a>
    </div>
  </main>
  <footer class="under-image" aria-label="下部画像">
    <img src="../Image/UnderImage.jpg" alt="">
  </footer>
  <script src="../assets/site.js"></script>
</body>
</html>
